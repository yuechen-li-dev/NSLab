name: NSLab CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Display dotnet info
        run: dotnet --info

      - name: Restore
        run: dotnet restore NSLab.sln

      - name: Build
        run: dotnet build NSLab.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test NSLab.sln --configuration Release --no-build --verbosity normal
